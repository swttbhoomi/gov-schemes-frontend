<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udaanpath - Register</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Udaanpath</div>
            <ul class="nav-links" id="main-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="schemes.html">Schemes</a></li>
                <li><a href="eligibility.html">Eligibility</a></li>
                <li><a href="about.html">About</a></li>
                <li id="nav-dashboard" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="nav-login"><a href="login.html" class="btn-nav">Login</a></li>
                <li id="nav-logout" style="display: none;"><a href="#" onclick="logoutUser(event)">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-page">
        <div class="container">
            <div class="auth-card">
                <h1>Register</h1>
                <form id="register-form" onsubmit="registerUser(event)">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                    <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Udaanpath. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
