<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udaanpath - Check Eligibility</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Udaanpath</div>
            <ul class="nav-links" id="main-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="schemes.html">Schemes</a></li>
                <li><a href="eligibility.html" class="active">Eligibility</a></li>
                <li><a href="about.html">About</a></li>
                <li id="nav-dashboard" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="nav-login"><a href="login.html" class="btn-nav">Login</a></li>
                <li id="nav-logout" style="display: none;"><a href="#" onclick="logoutUser(event)">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="eligibility-page">
        <div class="container">
            <h1 style="text-align: center; color: #007bff; margin-bottom: 0.5rem;">Check Your Eligibility</h1>
            <p style="text-align: center; margin-bottom: 3rem;">Answer a few quick questions to find schemes tailored for you.</p>

            <div class="split-layout">
                <div class="form-section">
                    <form id="eligibility-form" class="contact-form" onsubmit="checkEligibility(event)" style="margin: 0;">
                        <div class="form-group">
                            <label for="elig-state">Your State</label>
                            <select id="elig-state" required>
                                <option value="">Select State</option>
                                <option value="All">All India (Central Schemes)</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Karnataka">Karnataka</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="elig-income">Family Annual Income</label>
                            <select id="elig-income" required>
                                <option value="">Select Income Bracket</option>
                                <option value="Below 3L">Below ₹3 Lakhs</option>
                                <option value="Below 5L">Between ₹3L - ₹5 Lakhs</option>
                                <option value="Above 5L">Above ₹5 Lakhs</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="elig-type">What are you looking for?</label>
                            <select id="elig-type" required>
                                <option value="">Select Interest</option>
                                <option value="Scholarship">Scholarship for Studies</option>
                                <option value="Internship">Internships / Experience</option>
                                <option value="Course">Skill Training / Free Courses</option>
                                <option value="Loan">Educational Loans</option>
                            </select>
                        </div>
                        <button type="submit" class="btn" style="width: 100%;">Find My Schemes</button>
                    </form>
                </div>
                
                <div class="results-section">
                    <h2 style="margin-bottom: 1.5rem; color: #495057;">Your Matches</h2>
                    <div id="eligibility-results" class="schemes-grid" style="grid-template-columns: 1fr; gap: 1rem;">
                        <p class="placeholder-text" style="color: #6c757d; font-style: italic;">Fill out the form to see your matches here.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p style="text-align: center;">&copy; 2024 Udaanpath. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
