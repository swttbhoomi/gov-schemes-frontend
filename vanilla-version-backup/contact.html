<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udaanpath - Contact</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Udaanpath</div>
            <ul class="nav-links" id="main-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="schemes.html">Schemes</a></li>
                <li><a href="eligibility.html">Eligibility</a></li>
                <li><a href="about.html">About</a></li>
                <li id="nav-dashboard" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="nav-login"><a href="login.html" class="btn-nav">Login</a></li>
                <li id="nav-logout" style="display: none;"><a href="#" onclick="logoutUser(event)">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="contact-page">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Have questions? We'd love to hear from you.</p>

            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email address">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <ul class="footer-links">
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Terms of Service</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <p>&copy; 2024 Udaanpath. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
